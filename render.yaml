# Render blueprint for the Lumina backend.
# In the Render dashboard: New > Blueprint, point at this repo, then fill in
# the env vars marked sync:false (secrets) in the UI.
services:
  - type: web
    name: lumina-backend
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api
    envVars:
      - key: MONGO_URL
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: DB_NAME
        value: lumina_interview
      - key: APP_NAME
        value: lumina-interview
      # Set these to your real frontend URL after the frontend is deployed:
      - key: FRONTEND_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false
